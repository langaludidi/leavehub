<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradientWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3F4F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="25" cy="30" r="20" fill="url(#logoGradientWhite)" stroke="#4F46E5" stroke-width="2" />
  
  <!-- Calendar icon -->
  <rect x="15" y="20" width="20" height="20" rx="2" fill="#4F46E5" />
  <rect x="15" y="24" width="20" height="16" rx="1" fill="none" stroke="white" stroke-width="1.5" />
  
  <!-- Calendar grid -->
  <line x1="19" y1="28" x2="19" y2="36" stroke="white" stroke-width="0.8" />
  <line x1="23" y1="28" x2="23" y2="36" stroke="white" stroke-width="0.8" />
  <line x1="27" y1="28" x2="27" y2="36" stroke="white" stroke-width="0.8" />
  <line x1="31" y1="28" x2="31" y2="36" stroke="white" stroke-width="0.8" />
  
  <line x1="17" y1="30" x2="33" y2="30" stroke="white" stroke-width="0.8" />
  <line x1="17" y1="33" x2="33" y2="33" stroke="white" stroke-width="0.8" />
  
  <!-- Calendar rings -->
  <rect x="20" y="18" width="2" height="4" rx="1" fill="white" />
  <rect x="28" y="18" width="2" height="4" rx="1" fill="white" />
  
  <!-- Leave indicator dots -->
  <circle cx="21" cy="31.5" r="1.5" fill="#EF4444" />
  <circle cx="29" cy="34.5" r="1.5" fill="#10B981" />
  
  <!-- Company name -->
  <text x="55" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">LeaveHub</text>
  <text x="55" y="42" font-family="Arial, sans-serif" font-size="10" fill="#D1D5DB">Leave Management Platform</text>
</svg>